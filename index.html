<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Canon Event - Producer v3</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --danger: #ff4757; --go: #2ed573; }
        body { margin: 0; background: #000; color: var(--neon); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #player { width: 100vw; height: 100vh; position: absolute; top:0; z-index: 1; pointer-events: none; }
        
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 100; 
            background: rgba(10, 10, 10, 0.9); padding: 20px; border: 2px solid var(--neon); 
            border-radius: 10px; width: 320px; transition: 0.3s opacity;
        }
        .hidden { opacity: 0 !important; pointer-events: none !important; }

        .group { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        label { display: block; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; opacity: 0.6; }
        
        input { width: 90%; background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; margin-bottom: 8px; }
        button { width: 100%; padding: 10px; cursor: pointer; border: none; font-weight: bold; border-radius: 4px; margin-top: 5px; transition: 0.2s; }
        
        .btn-main { background: var(--neon); color: #000; }
        .btn-hide { background: #333; color: #888; font-size: 10px; margin-top: 15px; }
        
        .guest-entry { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 8px; margin-top: 5px; border-radius: 4px; }
        .mic-on { background: var(--go); color: white; width: auto; padding: 5px 10px; }
        .mic-off { background: var(--danger); color: white; width: auto; padding: 5px 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0 0 10px 0;">CANON EVENT</h2>
        
        <div class="group">
            <label>Your Identity</label>
            <input type="text" id="guest-name-input" placeholder="Enter Nickname..." oninput="updateMyName()">
            <p style="font-size: 11px;">Your ID: <strong id="my-id">...</strong></p>
        </div>

        <div class="group">
            <label>Connect to Remote</label>
            <input type="text" id="target-id" placeholder="Paste ID here">
            <button class="btn-main" onclick="connectPeer()">LINK GUEST / HOST</button>
        </div>

        <div class="group">
            <label>YouTube Sync</label>
            <input type="text" id="v-id" placeholder="Video ID (e.g. dQw4w9WgXcQ)">
            <button class="btn-main" onclick="syncVideo()">LOAD FOR ALL</button>
        </div>

        <div class="group" style="border:none;">
            <label>Guest Management</label>
            <div id="guest-display">
                <small style="opacity:0.5;">No guests linked yet.</small>
            </div>
        </div>

        <button class="btn-hide" onclick="toggleUI()">HIDE INTERFACE (H)</button>
    </div>

    <div id="player"></div>

    <script>
        let player, peer;
        let connections = {}; // Stores {peerId: {conn, name, muted}}
        let myMicStream;

        // 1. PeerJS Setup
        peer = new Peer();
        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // Host receives connection
        peer.on('connection', conn => handleConnection(conn));

        // Guest initiates connection
        function connectPeer() {
            const id = document.getElementById('target-id').value;
            handleConnection(peer.connect(id));
        }

        function handleConnection(conn) {
            conn.on('open', () => {
                connections[conn.peer] = { conn: conn, name: "Guest", muted: true };
                updateGuestList();
                
                // Send current name immediately upon connecting
                const myName = document.getElementById('guest-name-input').value || "Unnamed";
                conn.send({ type: 'name-update', name: myName });

                conn.on('data', data => {
                    if (data.type === 'name-update') {
                        connections[conn.peer].name = data.name;
                        updateGuestList();
                    }
                    if (data.type === 'load') player.loadVideoById(data.id);
                    if (data.type === 'mic-toggle') applyMic(data.enabled);
                });
            });
        }

        function updateMyName() {
            const name = document.getElementById('guest-name-input').value;
            Object.values(connections).forEach(c => {
                c.conn.send({ type: 'name-update', name: name });
            });
        }

        // 2. Guest Management (Host Side)
        function updateGuestList() {
            const container = document.getElementById('guest-display');
            container.innerHTML = "";
            Object.keys(connections).forEach(id => {
                const g = connections[id];
                const div = document.createElement('div');
                div.className = 'guest-entry';
                div.innerHTML = `
                    <span>${g.name}</span>
                    <button class="${g.muted ? 'mic-off' : 'mic-on'}" onclick="remoteToggleMic('${id}')">
                        ${g.muted ? 'MUTE' : 'LIVE'}
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function remoteToggleMic(id) {
            connections[id].muted = !connections[id].muted;
            connections[id].conn.send({ type: 'mic-toggle', enabled: !connections[id].muted });
            updateGuestList();
        }

        // 3. Audio Logic (Guest Side)
        async function applyMic(enabled) {
            try {
                if (!myMicStream) {
                    myMicStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false } });
                    const ctx = new AudioContext();
                    const src = ctx.createMediaStreamSource(myMicStream);
                    src.connect(ctx.destination);
                }
                myMicStream.getAudioTracks()[0].enabled = enabled;
            } catch (e) { alert("Mic Error: Check browser permissions!"); }
        }

        // 4. YouTube API
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1080', width: '1920', videoId: 'dQw4w9WgXcQ',
                playerVars: { 'autoplay': 1, 'controls': 0 }
            });
        }
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function syncVideo() {
            const vid = document.getElementById('v-id').value;
            player.loadVideoById(vid);
            Object.values(connections).forEach(c => c.conn.send({ type: 'load', id: vid }));
        }

        // 5. UI Toggles
        function toggleUI() { document.getElementById('ui').classList.toggle('hidden'); }
        window.addEventListener('keydown', e => { if (e.key.toLowerCase() === 'h') toggleUI(); });
    </script>
</body>
</html>
