<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canon Event - Producer Console v4</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --danger: #ff4757; --go: #2ed573; --panel: rgba(10, 10, 10, 0.95); }
        body { margin: 0; background: #000; color: var(--neon); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Video background */
        #player { width: 100vw; height: 100vh; position: absolute; top:0; z-index: 1; pointer-events: none; }
        
        /* HUD UI */
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 100; 
            background: var(--panel); padding: 20px; border: 2px solid var(--neon); 
            border-radius: 12px; width: 330px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden { opacity: 0 !important; pointer-events: none !important; }

        .group { margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid #333; }
        label { display: block; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; color: #888; }
        
        input { width: calc(100% - 18px); background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; margin-bottom: 8px; outline: none; }
        input:focus { border-color: var(--neon); }
        
        button { width: 100%; padding: 10px; cursor: pointer; border: none; font-weight: bold; border-radius: 4px; transition: 0.2s; font-family: inherit; }
        button:active { transform: scale(0.98); }
        
        .btn-main { background: var(--neon); color: #000; }
        .btn-main:hover { background: #00ccaa; }
        .btn-hide { background: #222; color: #666; font-size: 10px; margin-top: 10px; }

        /* Guest Row Styling */
        .guest-entry { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 10px; margin-top: 8px; border-radius: 6px; border-left: 3px solid #444; }
        .mic-btn { width: auto; padding: 6px 12px; margin: 0; font-size: 11px; }
        .mic-on { background: var(--go); color: white; }
        .mic-off { background: var(--danger); color: white; }
        .guest-name { font-size: 14px; color: #fff; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }

        #hint { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #444; z-index: 50; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0 0 15px 0; text-align: center; letter-spacing: 2px;">CANON EVENT</h2>
        
        <div class="group">
            <label>1. Your Guest Name</label>
            <input type="text" id="my-name" placeholder="VTuber Name..." oninput="syncMyName()">
            <div style="font-size: 11px; color: #666;">Your ID: <strong id="my-id" style="color:var(--neon)">Generating...</strong></div>
        </div>

        <div class="group">
            <label>2. Connect to Room</label>
            <input type="text" id="target-id" placeholder="Paste Remote ID here">
            <button class="btn-main" onclick="connectToPeer()">LINK SINGER / HOST</button>
        </div>

        <div class="group">
            <label>3. Video Sync (ID Only)</label>
            <input type="text" id="v-id" placeholder="YouTube ID (e.g. dQw4w9WgXcQ)">
            <button class="btn-main" onclick="sendVideoSync()">UPDATE STAGE</button>
        </div>

        <div class="group" style="border:none; margin-bottom: 0;">
            <label>4. Active Singers</label>
            <div id="guest-list">
                <div style="font-size: 11px; opacity: 0.4; text-align: center; padding: 10px;">No connections found</div>
            </div>
        </div>

        <button class="btn-hide" onclick="toggleUI()">HIDE HUD (Key: H)</button>
    </div>

    <div id="player"></div>
    <div id="hint">HUD Toggle: H</div>

    <script>
        let player, peer;
        let connections = {}; // Stores {peerId: {conn, name, isMuted}}
        let localMicStream;

        // --- 1. PEERJS SETUP ---
        peer = new Peer();
        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // Host handles incoming connections
        peer.on('connection', conn => handleIncoming(conn));

        function connectToPeer() {
            const id = document.getElementById('target-id').value.trim();
            if (!id) return;
            handleIncoming(peer.connect(id));
        }

        function handleIncoming(conn) {
            conn.on('open', () => {
                connections[conn.peer] = { conn: conn, name: "New Guest", isMuted: true };
                
                // Send current name to the other side immediately
                const currentName = document.getElementById('my-name').value || "Guest";
                conn.send({ type: 'name-update', name: currentName });

                conn.on('data', data => {
                    if (data.type === 'name-update') {
                        connections[conn.peer].name = data.name;
                        refreshGuestUI();
                    }
                    if (data.type === 'load-video') {
                        player.loadVideoById(data.id);
                    }
                    if (data.type === 'mic-toggle') {
                        toggleHardwareMic(data.enabled);
                    }
                });

                refreshGuestUI();
            });
            
            conn.on('close', () => {
                delete connections[conn.peer];
                refreshGuestUI();
            });
        }

        function syncMyName() {
            const name = document.getElementById('my-name').value;
            Object.values(connections).forEach(c => {
                c.conn.send({ type: 'name-update', name: name });
            });
        }

        // --- 2. GUEST MANAGEMENT ---
        function refreshGuestUI() {
            const list = document.getElementById('guest-list');
            list.innerHTML = "";
            const keys = Object.keys(connections);
            
            if (keys.length === 0) {
                list.innerHTML = `<div style="font-size: 11px; opacity: 0.4; text-align: center; padding: 10px;">No connections found</div>`;
                return;
            }

            keys.forEach(id => {
                const g = connections[id];
                const row = document.createElement('div');
                row.className = 'guest-entry';
                row.innerHTML = `
                    <span class="guest-name">${g.name}</span>
                    <button class="mic-btn ${g.isMuted ? 'mic-off' : 'mic-on'}" onclick="remoteMicControl('${id}')">
                        ${g.isMuted ? 'MUTE' : 'LIVE'}
                    </button>
                `;
                list.appendChild(row);
            });
        }

        function remoteMicControl(id) {
            const g = connections[id];
            g.isMuted = !g.isMuted;
            g.conn.send({ type: 'mic-toggle', enabled: !g.isMuted });
            refreshGuestUI();
        }

        // --- 3. HARDWARE MIC (SINGER SIDE) ---
        async function toggleHardwareMic(enabled) {
            try {
                if (!localMicStream) {
                    localMicStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                    });
                    const ctx = new AudioContext();
                    const src = ctx.createMediaStreamSource(localMicStream);
                    src.connect(ctx.destination);
                }
                localMicStream.getAudioTracks()[0].enabled = enabled;
            } catch (e) {
                alert("MICROPHONE ERROR: Please ensure your site is using HTTPS and you have granted permission.");
            }
        }

        // --- 4. YOUTUBE API ---
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1080', width: '1920', videoId: 'dQw4w9WgXcQ',
                playerVars: { 
                    'autoplay': 1, 'controls': 0, 'modestbranding': 1, 
                    'rel': 0, 'origin': window.location.origin 
                }
            });
        }

        function sendVideoSync() {
            const vidId = document.getElementById('v-id').value.trim();
            if (!vidId) return;
            player.loadVideoById(vidId);
            Object.values(connections).forEach(c => {
                c.conn.send({ type: 'load-video', id: vidId });
            });
        }

        // --- 5. UI UTILITIES ---
        function toggleUI() { document.getElementById('ui').classList.toggle('hidden'); }
        window.addEventListener('keydown', e => { 
            if (e.key.toLowerCase() === 'h') toggleUI(); 
        });
    </script>
</body>
</html>
